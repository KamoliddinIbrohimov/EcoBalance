name: Deploy to VPS

# Builds api + web images, pushes them to GHCR, then SSHs into the server
# and rolls out the new stack via `docker compose pull && up -d`.
#
# Required GitHub secrets:
#   DEPLOY_HOST      — server IP or hostname (e.g. 62.171.187.218)
#   DEPLOY_SSH_KEY   — private SSH key (contents of ~/.ssh/id_ed25519 or similar)
#
# Optional secrets (with sensible defaults):
#   DEPLOY_USER      — SSH user (default: root)
#   DEPLOY_PATH      — path on server (default: /root/eco-balance)
#   DEPLOY_SSH_PORT  — SSH port (default: 22)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, web]
    outputs:
      image_api: ${{ steps.tag.outputs.image_api }}
      image_web: ${{ steps.tag.outputs.image_web }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          owner_lc=$(echo "${{ env.IMAGE_OWNER }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$owner_lc" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${owner_lc}/ecobalance-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.tag.outputs.image }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64

  deploy:
    name: Roll out to VPS
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - name: Determine SSH connection
        id: ssh
        run: |
          echo "user=${DEPLOY_USER:-root}" >> "$GITHUB_OUTPUT"
          echo "path=${DEPLOY_PATH:-/root/eco-balance}" >> "$GITHUB_OUTPUT"
          echo "port=${DEPLOY_SSH_PORT:-22}" >> "$GITHUB_OUTPUT"
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ steps.ssh.outputs.user }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ steps.ssh.outputs.port }}
          command_timeout: 20m
          script: |
            set -e
            cd ${{ steps.ssh.outputs.path }}

            echo "▸ git pull"
            git pull --ff-only origin main

            # Images live at ghcr.io/kamoliddinibrohimov/ecobalance-{api,web}.
            # If those packages are public (Package settings → Change visibility → Public),
            # no login is needed. Otherwise, run once on the server:
            #   echo "<GHCR_PAT>" | docker login ghcr.io -u <username> --password-stdin

            echo "▸ pull latest images"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            echo "▸ deploy (up -d)"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "▸ prune old images"
            docker image prune -f

            echo "▸ container status"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for health endpoint
        run: |
          set -e
          host="${{ secrets.DEPLOY_HOST }}"
          port="${DEPLOY_HTTP_PORT:-8890}"
          url="http://${host}:${port}/api/v1/health"
          echo "Polling $url …"
          for i in $(seq 1 30); do
            if curl -sf "$url" > /dev/null; then
              echo "✓ API is up"
              curl -s "$url" | head -c 300
              exit 0
            fi
            sleep 4
          done
          echo "✗ API did not become healthy in time"
          exit 1
        env:
          DEPLOY_HTTP_PORT: ${{ secrets.DEPLOY_HTTP_PORT }}

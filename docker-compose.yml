# Eco-Balance Platform — full local stack (NestJS + Next.js)
# Usage:
#   cp .env.example .env
#   docker compose up -d

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: eco-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks: [eco]

  api:
    build:
      context: ./infra/docker/node
      dockerfile: Dockerfile
    container_name: eco-api
    restart: unless-stopped
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        set -e
        echo "▸ pnpm install"
        pnpm install
        echo "▸ build @eco/shared (compile shared package to JS)"
        pnpm --filter @eco/shared build
        echo "▸ prisma generate"
        pnpm --filter @eco/api exec prisma generate
        echo "▸ prisma db push (Phase 0 — no migrations yet, syncing schema directly)"
        pnpm --filter @eco/api exec prisma db push --accept-data-loss
        echo "▸ prisma db seed"
        pnpm --filter @eco/api exec prisma db seed || true
        echo "▸ nest start:dev"
        pnpm --filter @eco/api start:dev
    volumes:
      - ./:/workspace
      - api_node_modules:/workspace/node_modules
      - api_app_node_modules:/workspace/apps/api/node_modules
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://${REDIS_HOST}:${REDIS_PORT}
      PORT: ${API_PORT:-4000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [eco]

  web:
    build:
      context: ./infra/docker/node
      dockerfile: Dockerfile
    container_name: eco-web
    restart: unless-stopped
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        set -e
        # Wait until API's pnpm install has populated the workspace lockfile.
        until [ -f /workspace/pnpm-lock.yaml ]; do
          echo "waiting for pnpm-lock.yaml…"
          sleep 2
        done
        pnpm install
        pnpm --filter @eco/web dev
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules
      - web_next_cache:/workspace/apps/web/.next
    env_file: [.env]
    environment:
      NODE_ENV: development
      PORT: ${WEB_PORT:-3000}
    depends_on:
      - api
    networks: [eco]

  postgres:
    image: postgres:16-alpine
    container_name: eco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [eco]

  redis:
    image: redis:7-alpine
    container_name: eco-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [eco]

  minio:
    image: minio/minio:latest
    container_name: eco-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks: [eco]

  minio-init:
    image: minio/mc:latest
    container_name: eco-minio-init
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do sleep 1; done;
      /usr/bin/mc mb -p local/${S3_BUCKET_PUBLIC:-ecobalance-public} || true;
      /usr/bin/mc mb -p local/${S3_BUCKET_PRIVATE:-ecobalance-private} || true;
      /usr/bin/mc anonymous set download local/${S3_BUCKET_PUBLIC:-ecobalance-public};
      exit 0;
      "
    networks: [eco]

  mailpit:
    image: axllent/mailpit:latest
    container_name: eco-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks: [eco]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_node_modules:
  api_app_node_modules:
  web_node_modules:
  web_app_node_modules:
  web_next_cache:

networks:
  eco:
    driver: bridge

# Production overlay for the Eco-Balance stack.
#
# Usage on the server (after `.env` is populated):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
#
# Key differences from the dev compose:
#   • api / web use pre-built images from GHCR — no source bind-mounts
#   • only nginx is exposed on the host (port ${NGINX_HTTP_PORT}, default 8890)
#   • minio, mailpit stay on the internal `eco` network — reachable by name only
#   • all containers restart automatically if the docker daemon restarts
#
# Networks and volumes stay identical to dev so a `docker compose down`
# followed by a prod up keeps the same postgres/redis/minio data.
#
# Requires Docker Compose v2.24+ (for !reset / !override YAML tags).

services:
  nginx:
    ports: !override
      - "${NGINX_HTTP_PORT:-8890}:80"

  api:
    image: ${GHCR_IMAGE_API:-ghcr.io/kamoliddinibrohimov/ecobalance-api:latest}
    pull_policy: always
    command: !reset null    # ignore dev bootstrap; use image CMD
    volumes: !reset []      # no source bind-mounts in prod
    restart: unless-stopped

  web:
    image: ${GHCR_IMAGE_WEB:-ghcr.io/kamoliddinibrohimov/ecobalance-web:latest}
    pull_policy: always
    command: !reset null    # ignore dev bootstrap; use image CMD
    volumes: !reset []
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  minio:
    ports: !reset []        # do not expose MinIO to the host in prod
    restart: unless-stopped

  # Mailpit is a dev-only tool — disabled in prod. Replace with a real SMTP
  # relay via MAIL_HOST=your.smtp.host in .env when notifications ship.
  mailpit:
    profiles: ["dev-only"]
